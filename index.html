<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sürpriz Yumurtan 🎁🐧</title>
<style>
body{margin:0;background:#bde7ff;font-family:Arial,sans-serif;text-align:center;overflow-x:hidden;}
.heart{position:fixed;bottom:-20px;font-size:16px;opacity:.6;animation:fly 8s linear infinite;}
@keyframes fly{0%{transform:translateY(0);}100%{transform:translateY(-110vh);}}
#title{margin-top:22px;font-size:22px;color:#333;}
#eggArea{position:relative;margin:30px auto;width:180px;height:auto;cursor:pointer;}
#egg{width:100%;display:block;}
#foil{position:absolute;top:0;left:0;width:100%;opacity:.9;transition:1s;}
.unwrap{transform:translateY(-180px) rotate(-22deg);opacity:0;}
#penguin{display:none;position:absolute;bottom:90px;left:50%;transform:translateX(-50%);width:120px;}
.walk{animation:walk 3s forwards;}
@keyframes walk{0%{left:-130px;}50%{left:50%;transform:translateX(-50%);}100%{left:50%;transform:translateX(-50%);}}
#note{display:none;background:white;width:90%;max-width:320px;margin:15px auto;padding:18px;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,.2);}
#text{min-height:160px;font-size:16px;line-height:1.4;}
button{padding:10px 18px;border:none;border-radius:8px;font-size:16px;margin:6px;cursor:pointer;}
#yes{background:#ff4d6d;color:white;}
#no{background:#777;color:white;transition:.3s;}
</style>
</head>
<body>

<h2 id="title">Senin için küçük bir sürpriz hazırladım</h2>

<div id="eggArea" onclick="openEgg()">
  <img id="egg" src="egg.png" alt="Sürpriz Yumurtası">
  <img id="foil" src="egg.png" alt="Jelatin">
</div>

<img id="penguin" src="penguin.png" alt="Tatlı Penguen">

<div id="note">
  <div id="text"></div>
  <div>
    <button id="yes" onclick="alert('Teşekkür ederim ❤️')">Evet</button>
    <button id="no" onmouseover="runAway()" onclick="runAway()">Hayır</button>
  </div>
</div>

<script>
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),9000);
},800);

function openEgg(){
  let foil=document.getElementById("foil");
  foil.classList.add("unwrap");
  setTimeout(()=>{
    document.getElementById("eggArea").style.display="none";
    let p=document.getElementById("penguin");
    p.style.display="block";
    p.classList.add("walk");
    setTimeout(showNote,3000);
  },1000);
}

let message = `Şuan belki hala otogardayız
belki bitti
belki devam ediyoruz.

Yaptığım şeyin bahanesi olmadığını
ve seni ne kadar çok kırdığımı biliyorum.

Her şey için gerçekten çok özür diliyorum
ve çok pişmanım.

Seni gerçekten çok seviyorum.
Benim için gerçekten çok değerlisin.

Beni affeder misin?`;
function showNote(){
  document.getElementById("note").style.display="block";
  let i=0;
  function typeLetter(){
    if(i<message.length){
      document.getElementById("text").innerHTML+=message.charAt(i++);
      setTimeout(typeLetter,35);
    }
  }
  typeLetter();
}

let scale=1;
function runAway(){
  let no=document.getElementById("no");
  scale-=0.1;
  no.style.transform="scale("+scale+")";
  let x=Math.random()*150-75;
  let y=Math.random()*150-75;
  no.style.transform+=" translate("+x+"px,"+y+"px)";
  if(scale<0.3) no.style.display="none";
}
</script>

</body>
</html>
